# Lead Mining Platform — local orchestration.
# Supabase is a hosted dependency; set its keys in .env (see backend/.env.example).
# Redis is included for Phase 2 (BullMQ) but not required by Phase 1.
version: '3.9'

services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    ports:
      - '4000:4000'
    environment:
      PORT: 4000
      NODE_ENV: production
      CORS_ORIGIN: http://localhost:3000
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      APIFY_TOKEN: ${APIFY_TOKEN}
      FAILOVER_ENABLED: ${FAILOVER_ENABLED:-false}
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - '3000:3000'
    depends_on:
      - backend
    restart: unless-stopped

  # Phase 2: job queue backing store
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    restart: unless-stopped
